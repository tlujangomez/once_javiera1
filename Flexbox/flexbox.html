<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjeta de Perfil - Flexbox</title>
  <style>
    /* RESET Y ESTILOS BASE */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #121e8d;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;             /* FLEX 1: Para centrar la tarjeta en pantalla */
      justify-content: center;   /* JUSTIFY-CONTENT 1 */
      align-items: center;       /* ALIGN-ITEMS */
      min-height: 100vh;
    }

    /* CONTENEDOR PRINCIPAL */
    .profile-card {
      background: rgb(52, 6, 126);
      width: 350px;
      padding: 25px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(161, 48, 48, 0.08);
      
      display: flex;             /* FLEX 2 */
      flex-direction: column;    /* FLEX-DIRECTION: columna */
      align-items: center;       /* ALIGN-ITEMS */
      gap: 20px;                 /* GAP */
    }

    /* HEADER Y AVATAR */
    .header-section {
      display: flex;             /* FLEX 3 */
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid #0c00f8;
      object-fit: cover;
    }

    .user-info {
      text-align: center;
    }

    .user-info h1 {
      font-size: 1.4rem;
      color: #ffffff;
    }

    .user-info span {
      color: #f8f8f8;
      font-weight: 500;
    }

    .bio {
      text-align: center;
      font-size: 0.95rem;
      color: #ffffff;
      line-height: 1.4;
    }

    /* ESTADÍSTICAS */
    .stats-container {
      display: flex;             /* FLEX 4 */
      width: 100%;
      justify-content: space-around; /* JUSTIFY-CONTENT 2 */
      padding: 15px 0;
      border-top: 1px solid #fcfdff;
      border-bottom: 1px solid #ffffff;
    }

    .stat-item {
      text-align: center;
    }

    .stat-item strong {
      display: block;
      font-size: 1.1rem;
      color: #f0f3f8;
    }

    .stat-item p {
      font-size: 0.75rem;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* BOTONES */
    .actions-container {
      display: flex;             /* FLEX 5 */
      width: 100%;
      gap: 12px;
    }

    .btn {
      flex: 1;                   /* FLEX: 1 (crece equitativamente) */
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.9; }

    .btn-primary { background: #064e16; color: rgb(245, 245, 245); }
    .btn-secondary { background: #3c5485; color: #1f2937; }

    /* MINIATURAS DE PROYECTOS */
    .projects-grid {
      display: flex;             /* FLEX 6 */
      flex-wrap: wrap;           /* FLEX-WRAP */
      justify-content: center;
      gap: 8px;
    }

    .projects-grid img {
      width: 90px;
      height: 70px;
      border-radius: 8px;
      object-fit: cover;
    }
  </style>
</head>
